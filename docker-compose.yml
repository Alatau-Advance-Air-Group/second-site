services:
  site:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: site-for-invitations
    depends_on:
      - api
    ports:
      - "8080:80"
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: site-for-invitations-api
    volumes:
      - registrations_data:/data
    restart: unless-stopped

volumes:
  registrations_data:
